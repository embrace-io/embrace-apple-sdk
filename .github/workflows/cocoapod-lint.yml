name: Cocoapod Build And Lint

on:
  workflow_call:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:

  build-and-lint-cocoapod:
    name: Cocoapod Build And Lint
    runs-on: macos-latest
    timeout-minutes: 60
    strategy:
      fail-fast: true

    permissions:
      checks: write
      pull-requests: write
    steps:
      - name: Select Xcode
        run: |
          sudo xcode-select -s /Applications/Xcode_26.0.app
          xcodebuild -version

      - name: Ensure the Platform is Downloaded
        run: |
          xcodebuild -runFirstLaunch
          xcrun simctl list
          for i in 1 2 3; do
            xcodebuild -downloadPlatform iOS && break
            if [ "$i" -eq 3 ]; then
              echo "::error title=downloadPlatform failed::all 3 attempts failed for iOS"
              exit 1
            fi
            echo "::warning title=downloadPlatform retry::attempt $i failed for iOS; retrying in 15s"
            sleep 15
          done
          xcodebuild -runFirstLaunch

      - name: Checkout PR
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        timeout-minutes: 2
        with:
          persist-credentials: false

      - name: Set up Ruby
        uses: ruby/setup-ruby@afeafc3d1ab54a631816aba4c914a0081c12ff2f # v1.310.0
        with:
          ruby-version: 3.2.2

      - name: Install Deps
        run: |
          gem install cocoapods
          gem install xcpretty

      - name: Install Pods
        working-directory: Examples/BrandGame-CocoaPods
        run: pod install

      - name: Build BrandGame-CocoaPods
        uses: ./.github/actions/run-xcodebuild
        with:
          workspace: Examples/BrandGame-CocoaPods/BrandGame.xcworkspace
          scheme: BrandGame
          platform: iOS
          action: build

      - name: Lint Podspec
        id: lint
        shell: bash
        run: |
          set -eo pipefail
          pod lib lint --allow-warnings --verbose --platforms=iOS 2>&1 | tee cocoapod-lint-output.log

      - name: Upload Lint Output on Failure
        if: failure() || cancelled()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: cocoapod-lint-output
          path: cocoapod-lint-output.log
          retention-days: 2
