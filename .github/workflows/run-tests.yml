name: Run Swift Tests

on:
  workflow_call:
    secrets:
      CODECOV_TOKEN:
        required: true
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set.outputs.matrix }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - id: set
        run: |
          if [[ "${GITHUB_EVENT_NAME}" == "push" && "${GITHUB_REF}" == "refs/heads/main" ]]; then
            MATRIX=$(jq -c .main .github/matrices/builds.json)
          else
            MATRIX=$(jq -c .pr .github/matrices/builds.json)
          fi
          echo "matrix=${MATRIX}" >> "$GITHUB_OUTPUT"

  run-tests:
    needs: prepare
    name: Test ${{ matrix.platform }}, on macOS ${{ matrix.macos-version }}, with Xcode ${{ matrix.xcode_version }}, sanitizer ${{ matrix.sanitizer }}
    timeout-minutes: 30
    runs-on: macos-${{ matrix.macos-version }}
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.prepare.outputs.matrix) }}

    permissions:
      checks: write
    steps:
      - name: Select Xcode
        run: |
          sudo xcode-select -s /Applications/Xcode_${MATRIX_XCODE_VERSION}.app
          xcodebuild -version
        continue-on-error: false
        env:
          MATRIX_XCODE_VERSION: ${{ matrix.xcode_version }}

      - name: Ensure the Platform is Downloaded
        if: ${{ matrix.platform != 'macOS' && matrix.platform != 'mac-catalyst' }}
        run: |
          xcodebuild -runFirstLaunch
          xcrun simctl list
          xcodebuild -downloadPlatform ${MATRIX_PLATFORM}
          xcodebuild -runFirstLaunch
        env:
          MATRIX_PLATFORM: ${{ matrix.platform }}

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        timeout-minutes: 2
        with:
          persist-credentials: false

      - name: Cache SwiftPM packages
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/Library/Developer/Xcode/DerivedData/embrace-apple-sdk-*/SourcePackages
          key: swiftpm-${{ runner.os }}-${{ hashFiles('Package.resolved') }}
          restore-keys: swiftpm-${{ runner.os }}-

      - name: Run Unit Tests
        uses: mxcl/xcodebuild@d3ee9b419c1be9a988086c58fe0988f32d99cfc5 # v3.6.0
        timeout-minutes: 80
        with:
          workspace: ".swiftpm/xcode/package.xcworkspace"
          scheme: EmbraceIO-Package
          platform: ${{ matrix.platform }}
          platform-version: ${{ matrix.platform-version }}
          upload-logs: always
          code-coverage: true
          trust-plugins: false
          arch: arm64
          sanitizer: ${{ matrix.sanitizer }}

      # Dumps the human-readable failure summary and per-test failure tree
      # (with file:line) into the job log so a failure can be diagnosed
      # without downloading the ~75 MB xcresult artifact — especially
      # relevant for TSan aborts.
      - name: Surface failure summary from xcresult
        if: failure()
        run: |
          if [ ! -d test.xcresult ]; then
            echo "test.xcresult not found in $(pwd); skipping summary."
            exit 0
          fi
          echo "::group::Test results summary"
          xcrun xcresulttool get test-results summary --path test.xcresult || true
          echo "::endgroup::"
          echo "::group::Per-test failures (file:line)"
          xcrun xcresulttool get test-results tests --path test.xcresult || true
          echo "::endgroup::"

      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2 # v6.0.0
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }} # zizmor: ignore[secrets-outside-env]
