name: Run Swift Tests

on:
  workflow_call:
    secrets:
      CODECOV_TOKEN:
        required: true
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set.outputs.matrix }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - id: set
        run: |
          if [[ "${GITHUB_EVENT_NAME}" == "push" && "${GITHUB_REF}" == "refs/heads/main" ]]; then
            MATRIX=$(jq -c .main .github/matrices/builds.json)
          else
            MATRIX=$(jq -c .pr .github/matrices/builds.json)
          fi
          echo "matrix=${MATRIX}" >> "$GITHUB_OUTPUT"

  run-tests:
    needs: prepare
    name: Test ${{ matrix.platform }}, on macOS ${{ matrix.macos-version }}, with Xcode ${{ matrix.xcode_version }}, sanitizer ${{ matrix.sanitizer }}
    # 20 min: typical run is ~6 min compile + ~5 min tests. Per-test timeouts
    # (see .github/actions/run-xcodebuild) catch single-method hangs; this
    # job-level cap is the backstop for XCTest infra / parallel-worker hangs.
    timeout-minutes: 20
    runs-on: macos-${{ matrix.macos-version }}
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.prepare.outputs.matrix) }}

    steps:
      - name: Select Xcode
        run: |
          sudo xcode-select -s /Applications/Xcode_${MATRIX_XCODE_VERSION}.app
          xcodebuild -version
        continue-on-error: false
        env:
          MATRIX_XCODE_VERSION: ${{ matrix.xcode_version }}

      - name: Ensure the Platform is Downloaded
        if: ${{ matrix.platform != 'macOS' && matrix.platform != 'mac-catalyst' }}
        run: |
          xcodebuild -runFirstLaunch
          xcrun simctl list
          for i in 1 2 3; do
            xcodebuild -downloadPlatform "${MATRIX_PLATFORM}" && break
            if [ "$i" -eq 3 ]; then
              echo "::error title=downloadPlatform failed::all 3 attempts failed for ${MATRIX_PLATFORM}"
              exit 1
            fi
            echo "::warning title=downloadPlatform retry::attempt $i failed for ${MATRIX_PLATFORM}; retrying in 15s"
            sleep 15
          done
          xcodebuild -runFirstLaunch
        env:
          MATRIX_PLATFORM: ${{ matrix.platform }}

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        timeout-minutes: 2
        with:
          persist-credentials: false

      - name: Cache SwiftPM packages
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/Library/Developer/Xcode/DerivedData/embrace-apple-sdk-*/SourcePackages
          key: swiftpm-${{ runner.os }}-${{ hashFiles('Package.resolved') }}
          restore-keys: swiftpm-${{ runner.os }}-

      - name: Run Unit Tests
        uses: ./.github/actions/run-xcodebuild
        with:
          workspace: ".swiftpm/xcode/package.xcworkspace"
          scheme: EmbraceIO-Package
          platform: ${{ matrix.platform }}
          platform-version: ${{ matrix.platform-version }}
          arch: arm64
          action: test
          sanitizer: ${{ matrix.sanitizer }}
          code-coverage: 'true'
          result-bundle-path: ./test.xcresult

      - name: Upload xcresult on failure or cancellation
        if: failure() || cancelled()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: xcresult-${{ matrix.platform }}-xcode${{ matrix.xcode_version }}-${{ matrix.sanitizer }}
          path: test.xcresult
          retention-days: 7

      # Dumps the human-readable failure summary and per-test failure tree
      # (with file:line) into the job log so a failure can be diagnosed
      # without downloading the ~75 MB xcresult artifact — especially
      # relevant for TSan aborts.
      - name: Surface failure summary from xcresult
        if: failure() || cancelled()
        run: |
          if [ ! -d test.xcresult ]; then
            echo "test.xcresult not found in $(pwd); skipping summary."
            exit 0
          fi
          echo "::group::Test results summary"
          xcrun xcresulttool get test-results summary --path test.xcresult || true
          echo "::endgroup::"
          echo "::group::Per-test failures (file:line)"
          xcrun xcresulttool get test-results tests --path test.xcresult || true
          echo "::endgroup::"

      - name: Upload coverage reports to Codecov
        if: success()
        uses: codecov/codecov-action@e79a6962e0d4c0c17b229090214935d2e33f8354 # v6.0.1
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }} # zizmor: ignore[secrets-outside-env]
