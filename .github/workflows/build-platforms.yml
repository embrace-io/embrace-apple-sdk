name: Build Platforms

on:
  workflow_call:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set.outputs.matrix }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - id: set
        run: |
          if [[ "${GITHUB_EVENT_NAME}" == "push" && "${GITHUB_REF}" == "refs/heads/main" ]]; then
            MATRIX=$(jq -c .main .github/matrices/builds.json)
          else
            MATRIX=$(jq -c .pr .github/matrices/builds.json)
          fi
          echo "matrix=${MATRIX}" >> "$GITHUB_OUTPUT"

  build:
    needs: prepare
    name: Build ${{ matrix.platform }}, on macOS ${{ matrix.macos-version }}, with Xcode ${{ matrix.xcode_version }}
    timeout-minutes: 30
    runs-on: macos-${{ matrix.macos-version }}
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.prepare.outputs.matrix) }}

    steps:
    - name: Select Xcode
      # See https://github.com/actions/runner-images/blob/main/images/macos/macos-15-Readme.md
      run: |
        sudo xcode-select -s /Applications/Xcode_${MATRIX_XCODE_VERSION}.app
        xcodebuild -version
      env:
        MATRIX_XCODE_VERSION: ${{ matrix.xcode_version }}

    - name: Ensure the Platform is Downloaded
      if: ${{ matrix.platform != 'macOS' && matrix.platform != 'mac-catalyst' }}
      run: |
        xcodebuild -runFirstLaunch
        xcrun simctl list
        for i in 1 2 3; do
          xcodebuild -downloadPlatform "${MATRIX_PLATFORM}" && break
          if [ "$i" -eq 3 ]; then
            echo "::error title=downloadPlatform failed::all 3 attempts failed for ${MATRIX_PLATFORM}"
            exit 1
          fi
          echo "::warning title=downloadPlatform retry::attempt $i failed for ${MATRIX_PLATFORM}; retrying in 15s"
          sleep 15
        done
        xcodebuild -runFirstLaunch
      env:
        MATRIX_PLATFORM: ${{ matrix.platform }}

    - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      timeout-minutes: 4
      with:
        persist-credentials: false

    - name: Cache SwiftPM packages
      uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
      with:
        path: ~/Library/Developer/Xcode/DerivedData/embrace-apple-sdk-*/SourcePackages
        key: swiftpm-${{ runner.os }}-${{ hashFiles('Package.resolved') }}
        restore-keys: swiftpm-${{ runner.os }}-

    - name: Build
      uses: ./.github/actions/run-xcodebuild
      with:
        workspace: ".swiftpm/xcode/package.xcworkspace"
        scheme: EmbraceIO-Package
        platform: ${{ matrix.platform }}
        platform-version: ${{ matrix.platform-version }}
        arch: arm64
        action: build
