name: Run Swift Tests v2

on:
  workflow_call:
    secrets:
      CODECOV_TOKEN:
        required: true
  workflow_dispatch: {}
  pull_request: {}
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  run-tests:
    timeout-minutes: 30
    runs-on: "macos-${{ matrix.macos-version || 'latest' }}"
    strategy:
      fail-fast: false
      matrix:
        xcode-version: "16.4"
        include:
          - platform: iOS
            macos-version: "15"
          - platform: iOS
            xcode-version: "latest-stable"
            macos-version: "15"
          - platform: iOS
            platform-version: ~16.4.0
            macos-version: "13"
            xcode-version: "14.3.1"

          - platform: watchOS
            macos-version: "15"
          - platform: watchOS
            platform-version: ~9.4.0
            macos-version: "13"
            xcode-version: "14.3.1"

          - platform: tvOS
            macos-version: "15"
          - platform: tvOS
            platform-version: ~16.4.0
            macos-version: "13"
            xcode-version: "14.3.1"

          - platform: macOS
          - platform: macOS
            macos-version: "13"

          - platform: mac-catalyst
          - platform: mac-catalyst
            macos-version: "13"
    permissions:
      checks: write
    steps:
      - name: Select Xcode
        # See https://github.com/actions/runner-images/blob/main/images/macos/macos-15-Readme.md
        run: |
          sudo xcode-select -s /Applications/Xcode_${{ matrix.xcode_version }}.app
          xcodebuild -version

      - name: Ensure the Platform is Downloaded
        if: ${{ matrix.platform != 'macOS' && matrix.platform != 'mac-catalyst' }}
        run: |
          xcodebuild -runFirstLaunch
          xcrun simctl list
          xcodebuild -downloadPlatform ${{ matrix.platform }}
          xcodebuild -runFirstLaunch

      - uses: actions/checkout@v4
        timeout-minutes: 2
        with:
          persist-credentials: false

      - name: Run Tests
        run: bin/test ${{ matrix.platform }}
        timeout-minutes: 30
