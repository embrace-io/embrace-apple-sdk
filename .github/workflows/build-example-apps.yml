name: Build Example Apps

on:
  workflow_call: {}
  workflow_dispatch: {}
  pull_request: {}

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  build-brandgame-app:
    name: Build BrandGame App
    timeout-minutes: 20
    runs-on: macos-26
    strategy:
      fail-fast: false
      matrix:
        xcode_version: ["26.5"]
    env:
      PROJECT_DIR: ./Examples/BrandGame
      PROJECT_NAME: BrandGame.xcodeproj
      SCHEME: BrandGame
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        timeout-minutes: 4
        with:
          persist-credentials: false

      - name: Check project exists
        id: check
        run: |
          if [[ ! -d "$PROJECT_DIR/$PROJECT_NAME" ]]; then
            echo "::notice title=Example app not on this branch::$PROJECT_DIR/$PROJECT_NAME is absent — skipping the build"
            echo "skip=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Select Xcode
        if: steps.check.outputs.skip != 'true'
        # See https://github.com/actions/runner-images/blob/main/images/macos/macos-26-Readme.md
        run: |
          sudo xcode-select -s /Applications/Xcode_${{ matrix.xcode_version }}.app
          xcodebuild -version

      - name: Build
        if: steps.check.outputs.skip != 'true'
        uses: ./.github/actions/run-xcodebuild
        with:
          project: ${{ env.PROJECT_DIR }}/${{ env.PROJECT_NAME }}
          scheme: ${{ env.SCHEME }}
          platform: iOS
          action: build

  build-demoobjc-app:
    name: Build Objc Demo App
    timeout-minutes: 20
    runs-on: macos-26
    strategy:
      fail-fast: false
      matrix:
        xcode_version: ["26.5"]
    env:
      PROJECT_DIR: ./Examples/DemoObjectiveC
      PROJECT_NAME: DemoObjectiveC.xcodeproj
      SCHEME: DemoObjectiveC
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        timeout-minutes: 4
        with:
          persist-credentials: false

      - name: Check project exists
        id: check
        run: |
          if [[ ! -d "$PROJECT_DIR/$PROJECT_NAME" ]]; then
            echo "::notice title=Example app not on this branch::$PROJECT_DIR/$PROJECT_NAME is absent — skipping the build"
            echo "skip=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Select Xcode
        if: steps.check.outputs.skip != 'true'
        # See https://github.com/actions/runner-images/blob/main/images/macos/macos-26-Readme.md
        run: |
          sudo xcode-select -s /Applications/Xcode_${{ matrix.xcode_version }}.app
          xcodebuild -version

      - name: Build
        if: steps.check.outputs.skip != 'true'
        uses: ./.github/actions/run-xcodebuild
        with:
          project: ${{ env.PROJECT_DIR }}/${{ env.PROJECT_NAME }}
          scheme: ${{ env.SCHEME }}
          platform: iOS
          action: build
